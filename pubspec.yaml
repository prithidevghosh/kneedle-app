name: kneedle
description: Kneedle — on-device AI knee arthritis companion. Powered by Gemma 4 E2B.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # On-device LLM — Gemma 4 E2B via LiteRT
  # Pinned to 0.15.0. 0.15.1 bumps the native LiteRT runtime to v0.11.0-b,
  # which made the GPU/OpenCL path much more sensitive to other clients on
  # the queue (camera, ML Kit pose) and broke multimodal gait analysis with
  # CL_INVALID_COMMAND_QUEUE (-36) during decode. Re-evaluate once upstream
  # stabilises that runtime.
  flutter_gemma: 0.15.0

  # Pose & camera
  # google_mlkit_pose_detection works on iOS+Android with the same 33-landmark
  # BlazePose topology; replaces flutter_pose_detection (incompatible TFLite
  # pin against flutter_gemma's LiteRT on iOS).
  google_mlkit_pose_detection: ^0.14.0
  google_mlkit_commons: ^0.11.0
  camera: ^0.11.0+2

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  # Optional offline STT engine. Disabled by default — flip `kUseVoskStt` in
  # lib/services/stt_config.dart to route VoiceService through Vosk instead
  # of the platform recognizer. Adds an extra ~50 MB model download on first
  # launch (downloaded with the same flow as the Gemma weights) and removes
  # the dependency on Google's offline speech pack.
  vosk_flutter_service: ^0.1.1
  http: ^1.2.0

  # Storage (Hive — embedded, no codegen needed for inline adapters)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # PDF export
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.1.4

  # Utility
  permission_handler: ^12.0.0
  intl: ^0.19.0
  collection: ^1.18.0

  # JPEG encoding for the 4 video frames we attach to Gemma's multimodal
  # analysis prompt (2 frontal + 2 sagittal). The camera plugin delivers raw
  # YUV/BGRA bytes; we convert → RGB → JPEG so flutter_gemma's vision encoder
  # can ingest them.
  image: ^4.3.0

  # Open YouTube exercise demos externally (in the YouTube app when installed,
  # else the system browser). We deliberately avoid embedded IFrame playback
  # because too many physio-channel videos disable third-party embeds
  # (YouTube error 152), which would otherwise show a broken player in the
  # report. The thumbnail-plus-tap pattern works for 100 % of valid links.
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/prompts/
    - assets/kb/
